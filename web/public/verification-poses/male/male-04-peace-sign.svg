<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 256 256" role="img" aria-label="male verification pose peace-sign">
<defs>
  <radialGradient id="bgGrad" cx="50%" cy="40%" r="65%">
    <stop offset="0%" stop-color="#1A2744"/>
    <stop offset="60%" stop-color="#0E1626"/>
    <stop offset="100%" stop-color="#070B14"/>
  </radialGradient>
  <linearGradient id="skinLight" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#F3D5B5"/>
    <stop offset="45%" stop-color="#D4A373"/>
    <stop offset="85%" stop-color="#A87C5B"/>
    <stop offset="100%" stop-color="#7B503B"/>
  </linearGradient>
  <linearGradient id="skinShadow" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#C28E63"/>
    <stop offset="100%" stop-color="#6B4331"/>
  </linearGradient>
  <linearGradient id="hairGrad" x1="20%" y1="0%" x2="80%" y2="100%">
    <stop offset="0%" stop-color="#3A2925"/>
    <stop offset="50%" stop-color="#1F1513"/>
    <stop offset="100%" stop-color="#110B0A"/>
  </linearGradient>
  <linearGradient id="clothGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#243354"/>
    <stop offset="100%" stop-color="#0E1524"/>
  </linearGradient>
  <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#F3E5AB"/>
    <stop offset="50%" stop-color="#D9A752"/>
    <stop offset="100%" stop-color="#996515"/>
  </linearGradient>
  <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.5"/>
  </filter>
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>
</defs>

<rect width="256" height="256" rx="40" fill="url(#bgGrad)"/>
<circle cx="128" cy="110" r="105" fill="#182642" opacity="0.35"/>


    <g opacity="0.65">
      <circle cx="128" cy="110" r="92" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-dasharray="8 12"/>
      <path d="M 128 14 L 128 22 M 128 198 L 128 206 M 32 110 L 40 110 M 216 110 L 224 110" stroke="#D9A752" stroke-width="2" stroke-linecap="round"/>
      <rect x="52" y="34" width="16" height="16" fill="none" stroke="#38BDF8" stroke-width="2" stroke-dasharray="16 0" opacity="0.8"/>
      <rect x="188" y="34" width="16" height="16" fill="none" stroke="#38BDF8" stroke-width="2" stroke-dasharray="16 0" opacity="0.8"/>
      <rect x="52" y="170" width="16" height="16" fill="none" stroke="#38BDF8" stroke-width="2" stroke-dasharray="16 0" opacity="0.8"/>
      <rect x="188" y="170" width="16" height="16" fill="none" stroke="#38BDF8" stroke-width="2" stroke-dasharray="16 0" opacity="0.8"/>
    </g>


<g filter="url(#dropShadow)">
  <!-- Neck and Shoulders -->
  <path d="M 44 236 C 58 188 92 176 128 176 C 164 176 198 188 212 236 L 212 256 L 44 256 Z" fill="url(#clothGrad)" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.4"/>
  <path d="M 104 148 L 152 148 L 158 195 L 98 195 Z" fill="url(#skinShadow)"/>

  <!-- Head Silhouette & Volumetric Portrait Form -->
  <g transform="rotate(0 128 110)">
    <path d="M 84 88 C 82 52 102 34 128 34 C 154 34 174 52 172 88 C 170 106 166 116 164 120 L 92 120 C 90 116 86 106 84 88 Z" fill="url(#hairGrad)" stroke="#D4A373" stroke-width="0.75" stroke-opacity="0.3"/>
    <path d="M 88 88 C 88 58 106 44 128 44 C 150 44 168 58 168 88 C 168 126 154 158 128 158 C 102 158 88 126 88 88 Z" fill="url(#skinLight)"/>
    <!-- Subtle realistic facial contour lighting (brow, cheekbone, jaw) -->
    <path d="M 100 84 C 112 80 128 80 144 84" fill="none" stroke="#FFF" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
    <path d="M 128 76 L 128 108" fill="none" stroke="#FFF" stroke-width="2" opacity="0.15" stroke-linecap="round"/>
    <path d="M 112 122 C 120 126 136 126 144 122" fill="none" stroke="#7B503B" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
    <path d="M 104 140 C 118 150 138 150 152 140" fill="none" stroke="#FFF" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  </g>
</g>


        <g transform="translate(164, 86) scale(0.95)" filter="url(#dropShadow)">
          <path d="M 12 36 L -6 -18 C -10 -28 -2 -34 4 -24 L 22 28 M 22 28 L 38 -20 C 42 -30 50 -26 46 -14 L 32 38 C 30 56 16 70 -2 70 C -18 70 -26 56 -24 38 Z" fill="url(#skinLight)" stroke="#D4A373" stroke-width="2.5" stroke-linejoin="round"/>
          <path d="M -22 36 C -16 26 -6 28 -2 38" fill="none" stroke="#A87C5B" stroke-width="3"/>
          <path d="M 32 40 C 40 30 50 34 44 46" fill="none" stroke="#A87C5B" stroke-width="3"/>
        </g>


<!-- High-end guidance badge/footer -->
<rect x="24" y="218" width="208" height="26" rx="13" fill="#0A111E" stroke="#D9A752" stroke-width="1" stroke-opacity="0.4"/>
<text x="128" y="235" font-family="sans-serif" font-size="10" font-weight="800" fill="#F3E5AB" text-anchor="middle" letter-spacing="1">PEACE SIGN</text>
</svg>
